<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الطبيب والحجز - مستشفى الشفاء</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>



<style>
    /* 1. تصفير المسافات لضمان التجاوب */
    * {
        box-sizing: border-box !important;
    }
    html, body {
        overflow-x: hidden !important;
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 5px !important;
    }

    /* 2. تصحيح الجريمة بتاعة الـ div المقاس الثابت */
    .container, .dashboard-container, .profile-card {
        width: 100% !important;
        max-width: 800px !important;
        margin: 10px auto !important;
    }

    /* 3. إجبار تقسيم الـ Grid والمربعات تلم نفسها على الموبايل */
    .grid {
        display: grid !important;
    }

    @media (max-width: 768px) {
        .grid {
            grid-template-columns: 1fr !important;
            gap: 15px !important;
        }
        div, section, form {
            max-width: 100% !important;
            width: 100% !important;
        }
    } /* القوس ده هو اللي كان ناقص عشان يقفل الـ media */
    /* 4. ضبط نصوص المواعيد عشان متخرجش برة */
    span, p, label, button, h1, h2, h3, h4, td, th {
        white-space: normal !important;
        word-break: break-word !important;
    }
</style>

</head>



<body class="bg-gray-50 font-sans min-h-screen p-6">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-md border overflow-hidden">
        
        <!-- هيدر الطبيب -->
        <div class="bg-blue-900 p-6 text-white flex flex-col sm:flex-row items-center gap-6">
            <img id="doc-img" src="" class="w-28 h-28 rounded-full object-cover border-4 border-blue-200">
            <div class="text-center sm:text-right">
                <h2 id="doc-name" class="text-2xl font-bold"></h2>
                <p id="doc-spec" class="text-blue-200 font-medium"></p>
                <p id="doc-bio" class="text-sm text-gray-300 mt-2"></p>
            </div>
        </div>

        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- مواعيد الطبيب خلال الأسبوع -->
            <div>
                <h3 class="font-bold text-gray-800 text-lg mb-3">📅 مواعيد الطبيب هذا الأسبوع:</h3>
                <div id="schedule-list" class="space-y-2"></div>
            </div>

            <div class="mb-4 bg-blue-5 text-p p-4 rounded-xl border border-blue-100">
    <label class="block text-sm font-bold text-blue-900 mb-2">اختر نوع الكشف:</label>
    <div class="flex gap-6">
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="appointment-type" value="عادي" checked onchange="updateSelectedPrice()">
            <span class="font-medium text-gray-800">كشف عادي (<span id="price-regular-view">0</span> جنيه)</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="appointment-type" value="مستعجل" onchange="updateSelectedPrice()">
            <span class="font-medium text-gray-800 text-red-600 font-bold">كشف مستعجل (<span id="price-urgent-view">0</span> جنيه)</span>
        </label>
    </div>
</div>

            <!-- فورم الدفع بـ فوري -->
            <!-- الجزء الخاص بالفورم داخل ملف profile.html -->
<div class="bg-gray-50 p-4 rounded-xl border">
    <h3 class="font-bold text-blue-950 mb-2">💳 الدفع السريع عبر فوري / كاش:</h3>
    <p class="text-xs text-amber-700 bg-amber-50 p-2 rounded mb-4 border border-amber-200">
        برجاء تحويل مبلغ **200 جنيه** للرقم: <strong class="text-blue-900">01099998887</strong> وارفع صورة الإيصال بالأسفل لتأكيد الحجز.
    </p>
    
    <form onsubmit="confirmBooking(event)" class="space-y-3">
        <div>
            <label class="block text-xs font-medium">اسم المريض:</label>
            <input type="text" id="p-name" required class="w-full border p-2 rounded-lg bg-white text-sm">
        </div>
        <div>
            <label class="block text-xs font-medium">رقم الهاتف:</label>
            <input type="tel" id="p-phone" required class="w-full border p-2 rounded-lg bg-white text-sm">
        </div>
        <div>
            <label class="block text-xs font-medium">اختر صورة إيصال فوري من جهازك:</label>
            <!-- غيرنا المدخل هنا ليكون ملف (File) بدل URL -->
            <input type="file" id="p-receipt-file" accept="image/*" required class="w-full border p-1.5 rounded-lg bg-white text-sm">
        </div>
        <button type="submit" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-bold hover:bg-green-700 transition">تأكيد الحجز وإرسال الإيصال 🚀</button>
    </form>
</div>

<script>
    // 1. قراءة بيانات الدكتور المختار من الـ localStorage
    const docData = localStorage.getItem('selectedDoctor');
    if (!docData) {
        alert('برجاء اختيار دكتور أولاً!');
        window.location.href = 'doctors.html';
    }
    const doc = JSON.parse(docData);
    // نضع الأسعار الافتراضية لو الأدمين لسه محدثهاش
document.getElementById('price-regular-view').innerText = doc.priceRegular || 200;
document.getElementById('price-urgent-view').innerText = doc.priceUrgent || 400;

    // 2. قراءة بيانات المريض الحالي المسجل دخوله
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));

    // عرض بيانات الدكتور في الصفحة
    document.getElementById('doc-img').src = doc.image;
    document.getElementById('doc-name').innerText = doc.name;
    document.getElementById('doc-spec').innerText = `تخصص ${doc.specialty} (${doc.branch})`;
    document.getElementById('doc-bio').innerText = doc.bio;

    // [تعديل ذكي]: لو المريض مسجل دخول، بنفتح الخانات يعدلها براحته بس بنسيب بياناته كاقتراح
    if (currentUser) {
        document.getElementById('p-name').value = currentUser.name;
        document.getElementById('p-phone').value = currentUser.phone;
    }

    // رسم مواعيد الدكتور
    const schedDiv = document.getElementById('schedule-list');
    schedDiv.innerHTML = '';
    Object.keys(doc.schedule).forEach((day, index) => {
        schedDiv.innerHTML += `
            <label class="flex items-center gap-3 p-3 bg-blue-50 rounded-xl border border-blue-100 cursor-pointer hover:bg-blue-100 transition block w-full mb-2 text-right">
                <input type="radio" name="selected_slot" value="${day} | ${doc.schedule[day]}" ${index === 0 ? 'checked' : ''} class="w-4 h-4 text-blue-600">
                <div class="inline-block mr-2">
                    <span class="font-bold text-blue-900">${day}:</span>
                    <span class="text-sm text-gray-700 mr-1">${doc.schedule[day]}</span>
                </div>
            </label>
        `;
    });

    // دالة تأكيد الحجز
    function confirmBooking(e) {
        e.preventDefault();

        const selectedRadio = document.querySelector('input[name="selected_slot"]:checked').value;
        const [day, slot] = selectedRadio.split(' | ');

        const fileInput = document.getElementById('p-receipt-file');
        const file = fileInput.files[0];

        if (!file) {
            alert('برجاء اختيار صورة الإيصال أولاً');
            return;
        }

        const reader = new FileReader();
        reader.onloadend = function () {
            const base64Image = reader.result;

            const typeSelected = document.querySelector('input[name="appointment-type"]:checked').value;
const priceSelected = typeSelected === 'عادي' ? (doc.priceRegular || 200) : (doc.priceUrgent || 400);

// ضيف دول جوة الـ object اللي بتبعته في الـ body:
// appointmentType: typeSelected,
// appointmentPrice: priceSelected,

            // تجهيز بيانات الحجز
            const bookingData = {
                patientName: document.getElementById('p-name').value.trim(), 
                phone: document.getElementById('p-phone').value.trim(),       
                // هنا بقى السر: لو المريض مسجل دخول بناخد تليفونه، لو مش مسجل بنحط رقم التليفون اللي كتبه عادي عشان السيرفر ميقفش
                accountPhone: currentUser ? currentUser.phone : document.getElementById('p-phone').value.trim(), 
                doctor: doc.name,
                day: day,
                slot: slot,
                price: "200 جنيه",
                receipt: base64Image
            };

            fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            }).then(() => {
                alert('تم إرسال حجزك بنجاح!');
                
                // [إلغاء طلب الـ Login]: لو هو جوه الأكونت يرجعه للـ Dashboard علطول، لو بره يوديه لصفحة الدخول
                if (currentUser) {
                    window.location.href = 'patient-dashboard.html';
                } else {
                    window.location.href = 'auth.html';
                }
            });
        };

        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
