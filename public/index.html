<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستشفى الشفاء - الفروع</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <style>
    /* كود الإنقاذ الشامل للمشروع كله على الموبايل */
    html, body {
        overflow-x: hidden !important; /* بيمنع الشاشة تتهز يمين وشمال تماماً */
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 5px !important;
    }
    
    /* بيمسك المربعات البيضاء أو أي حاوية مواعيد ويجبرها تقعد جوة إطار الشاشة */
    div, section, form, .container, [style*="background-color"] {
        max-width: 100% !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    /* بيلغي الإزاحة اللي زاقة المربعات لبرة الفريم */
    div[style*="background-color"], .appointment-card, .schedule-day {
        padding: 12px !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
    }

    /* بيجبر النص والمواعيد تنزل سطر جديد عشان مفيش حاجة تتقطع يمين أو شمال */
    span, p, label, button, h1, h2, h3, h4, td, th {
        white-space: normal !important;
        max-width: 100% !important;
        word-break: break-word !important;
    }
</style>
</head>

<!-- الهيدر الرئيسي لعيادات حياة كير -->
<div style="background-color: #3b4ca8; padding: 15px 20px; display: flex; align-items: center; justify-content: center; direction: rtl; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%;">
    <div style="display: flex; align-items: center; gap: 15px;">
        <!-- صورة اللوجو الدائرية -->
        <img src="logo.png" alt="Hayah Care Logo" style="width: 55px; height: 55px; border-radius: 50%; border: 2px solid white; object-fit: cover;">
        
        <!-- اسم العيادات عربي وإنجليزي -->
        <div style="display: flex; flex-direction: column; align-items: flex-start;">
            <span style="color: white; font-weight: bold; font-size: 1.4rem; font-family: sans-serif; line-height: 1.2;">عيادات حياة كير</span>
            <span style="color: #e0e0e0; font-size: 0.85rem; font-family: sans-serif; letter-spacing: 0.5px; font-weight: 500;">HAYAH CARE CLINICS</span>
        </div>
    </div>
</div>



<body class="bg-gray-50 p-6">
    <nav class="bg-blue-600 text-white p-4 rounded-xl mb-8 flex justify-between items-center">
        <h1 class="text-2xl font-bold">🏥 مستشفى الشفاء</h1>
        <a href="auth.html" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-medium">تسجيل الدخول</a>
    </nav>

    <h2 class="text-3xl font-bold text-center mb-8 text-blue-900">اختر فرع المستشفى</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
        <div onclick="goToSpecialties('القاهرة')" class="bg-white p-6 rounded-xl shadow-md cursor-pointer hover:scale-105 transition text-center border border-gray-200">
            <h3 class="text-2xl font-bold text-blue-700">فرع القاهرة</h3>
            <p class="text-gray-500 mt-2">وسط البلد - شارع التحرير</p>
        </div>
        <div onclick="goToSpecialties('الجيزة')" class="bg-white p-6 rounded-xl shadow-md cursor-pointer hover:scale-105 transition text-center border border-gray-200">
            <h3 class="text-2xl font-bold text-blue-700">فرع الجيزة</h3>
            <p class="text-gray-500 mt-2">شارع الهرم الرئيسي</p>
        </div>
        <div onclick="goToSpecialties('الإسكندرية')" class="bg-white p-6 rounded-xl shadow-md cursor-pointer hover:scale-105 transition text-center border border-gray-200">
            <h3 class="text-2xl font-bold text-blue-700">فرع الإسكندرية</h3>
            <p class="text-gray-500 mt-2">كورنيش جليم البحر</p>
        </div>
    </div>

    <script>
        function goToSpecialties(branch) {
            // بنحفظ الفرع اللي اخترناه في ذاكرة المتصفح عشان الصفحة الجاية تعرفه
            localStorage.setItem('selectedBranch', branch);
            window.location.href = 'specialties.html'; // نقل المستخدم لصفحة التخصصات منفصلة
        }
    </script>
</body>
</html>
