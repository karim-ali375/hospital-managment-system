<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الحسابات - مستشفى الشفاء</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<style>
    * {
        box-sizing: border-box;
    }
    body {
        margin: 0;
        padding: 15px;
        font-family: sans-serif;
    }
    /* بيخلي أي صندوق أو فورم أو حاوية تفرش بمقاس شاشة الموبايل */
    form, .container, div {
        width: 100% !important;
        max-width: 400px; /* مقاس مناسب جداً لشاشات الموبايل */
        margin: 0 auto;
    }
    /* بيظبط الخانات والزراير عشان متطلعش برة الشاشة وتكون سهلة في الكتابة */
    input, select, textarea, button {
        width: 100% !important;
        padding: 12px;
        margin-bottom: 15px;
        font-size: 16px; /* المقاس ده بيمنع الموبايل إنه يعمل زووم تلقائي وهو بيكتب */
    }
</style>


</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border">
        <h2 id="auth-title" class="text-2xl font-bold text-center text-blue-900 mb-6">تسجيل الدخول 🏥</h2>
        
       <form id="auth-form" onsubmit="handleSubmit(event)" enctype="multipart/form-data" class="space-y-4">
            <div id="signup-fields" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">الاسم بالكامل:</label>
                    <input type="text" id="fullname" class="w-full border p-2 rounded-xl mt-1 outline-blue-600">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">رقم الهاتف:</label>
                    <input type="tel" id="phone" class="w-full border p-2 rounded-xl mt-1 outline-blue-600">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">اختر صورتك الشخصية:</label>
                   <input type="file" id="user-avatar" name="image" accept="image/*" class="w-full border p-1.5 rounded-xl mt-1 bg-white text-xs">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">اسم المستخدم:</label>
                <input type="text" id="username" required class="w-full border p-2 rounded-xl mt-1 outline-blue-600">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">كلمة المرور:</label>
                <input type="password" id="password" required class="w-full border p-2 rounded-xl mt-1 outline-blue-600">
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">دخول</button>
        </form>

        <p class="text-center text-sm text-gray-600 mt-6">
            <span id="toggle-text">ليس لديك حساب؟</span>
            <button onclick="toggleAuthMode()" id="toggle-link" class="text-blue-600 font-bold underline ml-1">إنشاء حساب مريض</button>
        </p>
    </div>

    <script>
        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'تسجيل الدخول 🏥' : 'إنشاء حساب مريض جديد 🧑‍⚕️';
            document.getElementById('signup-fields').classList.toggle('hidden', isLoginMode);
            document.getElementById('submit-btn').innerText = isLoginMode ? 'دخول' : 'تسجيل حساب جديد';
        }

        function handleSubmit(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (isLoginMode) {
                if (user === 'admin' && pass === 'admin123') {
                    window.location.href = 'admin.html';
                    return;
                }
                
                fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        localStorage.setItem('currentUser', JSON.stringify(data.user));
                        window.location.href = 'patient-dashboard.html'; 
                    } else {
                        alert('اسم المستخدم أو الباسورد غلط!');
                    }
                });
            } else {
                // الشغل العالي والنظيف هنا لإنشاء الحساب 🚀
                const form = document.getElementById('auth-form');
                const formData = new FormData();

                // بنلم البيانات يدوي عشان نضمن إن الأسامي تطابق السيرفر بالملي
                formData.append('username', user);
                formData.append('password', pass);
                formData.append('name', document.getElementById('fullname').value);
                formData.append('phone', document.getElementById('phone').value);
                
                const fileInput = document.getElementById('user-avatar');
                if (fileInput.files[0]) {
                    // بنبعتها باسم 'image' وباسم 'avatar' احتياطي عشان ترضي السيرفر في الحالتين
                    formData.append('image', fileInput.files[0]);
                    formData.append('avatar', fileInput.files[0]);
                }

                fetch('/api/auth/signup', {
                    method: 'POST',
                    body: formData // بنبعت الـ formData مباشرة (بدون Headers وبدون JSON.stringify)
                })
                .then(res => {
                    if(res.ok) {
                        alert('تم إنشاء حسابك الشخصي بنجاح! يمكنك الآن تسجيل الدخول.');
                        toggleAuthMode();
                    } else {
                        alert('حصلت مشكلة أثناء التسجيل، تأكد من حجم الصورة!');
                    }
                })
                .catch(err => console.error('Error:', err));
            }
        }
</script>
</body>
</html>
