<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تخصصات المستشفى</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 p-6">
    <button onclick="window.history.back()" class="mb-4 bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold">← رجوع للصفحة السابقة</button>
    
    <h2 id="title" class="text-3xl font-bold text-center mb-8 text-blue-900">التخصصات المتاحة في فرع</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-2xl mx-auto">
        <div onclick="goToDoctors('باطنة')" class="bg-blue-50 border border-blue-200 p-6 rounded-xl text-center font-bold text-xl cursor-pointer hover:bg-blue-600 hover:text-white transition">🩺 تخصص الباطنة</div>
        <div onclick="goToDoctors('عيون')" class="bg-blue-50 border border-blue-200 p-6 rounded-xl text-center font-bold text-xl cursor-pointer hover:bg-blue-600 hover:text-white transition">👁️ تخصص العيون</div>
        <div onclick="goToDoctors('انف واذن')" class="bg-blue-50 border border-blue-200 p-6 rounded-xl text-center font-bold text-xl cursor-pointer hover:bg-blue-600 hover:text-white transition">👂 تخصص أنف وأذن</div>
        <div onclick="goToDoctors('علاج طبيعي')" class="bg-blue-50 border border-blue-200 p-6 rounded-xl text-center font-bold text-xl cursor-pointer hover:bg-blue-600 hover:text-white transition">🏃 تخصص علاج طبيعي</div>
    </div>

    <script>
        const currentBranch = localStorage.getItem('selectedBranch') || "القاهرة";
        document.getElementById('title').innerText = `التخصصات المتاحة في فرع (${currentBranch})`;

        function goToDoctors(specialty) {
            localStorage.setItem('selectedSpecialty', specialty);
            window.location.href = 'doctors.html'; // هيفتح صفحة الدكاترة المنفصلة
        }
    </script>
</body>
</html>
