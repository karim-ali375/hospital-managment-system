<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الحجز والدفع - فوري</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    /* 1. تصفير وإجبار على الاحتواء */
    * {
        box-sizing: border-box !important;
    }
    body {
        margin: 0 !important;
        padding: 10px !important;
        font-family: sans-serif;
        overflow-x: hidden !important; /* بيمنع الصفحة كلها تتهز يمين وشمال */
    }

    /* 2. هجوم شامل على أي حاوية أو div أو مربع واخد مقاس ثابت جوة الـ HTML */
    form, table, .container, .appointments-container, .schedule-container, div, 
    div[style*="width"], section, article {
        max-width: 100% !important;
        width: 100% !important;
    }

    /* 3. ضبط المربعات البيضاء (الكرات) اللي في الصورة بالظبط وتقليل المسافات الزيادة */
    div[style*="background-color"], .appointment-card, .schedule-day, form > div, 
    div[style*="background-color"] div {
        padding: 12px !important; 
        margin-left: 0 !important;
        margin-right: 0 !important;
        box-sizing: border-box !important;
    }

    /* 4. إجبار النصوص والمواعيد تظهر كاملة وتنزل سطر جديد وماتزقش الفريم */
    div[style*="background-color"] *, .appointment-card *, span, p, h1, h2, h3, h4, h5, h6 {
        max-width: 100% !important;
        white-space: normal !important; /* بينزل النص سطر جديد عشان يظهر كامل */
    }

    /* 5. ضبط جداول وخانات المواعيد */
    table {
        display: block !important;
        overflow-x: auto !important; 
    }

    .slots-grid, .time-slots, div[class*="slots"], div[class*="time"], div[class*="schedule"] {
        display: flex !important;
        flex-wrap: wrap !important; 
        gap: 8px !important;
        justify-content: center !important;
    }

    .slot, .time-btn, .appointment-slot, button, input[type="radio"]+label {
        display: inline-block !important;
        width: auto !important;
        max-width: 100% !important;
        padding: 10px 12px !important;
        font-size: 14px !important;
        text-align: center;
    }
    
    button, input, select, textarea {
        width: 100% !important;
        margin-bottom: 15px;
    }
</style>


</head>
<body class="bg-gray-50 p-6 font-sans">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-md border">
        <h2 class="text-2xl font-bold text-blue-900 mb-4 text-center">تأكيد الحجز والدفع الإلكتروني 💳</h2>
        
        <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl mb-6 text-sm text-amber-900">
            <p class="font-bold mb-1">📢 خطوات الدفع عبر فوري / كاش:</p>
            <p>1. قم بتحويل مبلغ **200 جنيه** إلى الرقم التالي: <strong class="text-base text-blue-900">01099998887</strong></p>
            <p>2. خذ لقطة شاشة (Screenshot) للإيصال وارفعها بالأسفل.</p>
        </div>

        <form onsubmit="submitBooking(event)" class="space-y-4">
            <div>
                <label class="block font-medium mb-1">اسم المريض بالكامل:</label>
                <input type="text" id="p-name" required class="w-full border p-2 rounded-xl outline-blue-600">
            </div>
            <div>
                <label class="block font-medium mb-1">رقم الهاتف:</label>
                <input type="tel" id="p-phone" required class="w-full border p-2 rounded-xl outline-blue-600">
            </div>
            <div>
                <label class="block font-medium mb-1">رابط صورة إيصال التحويل:</label>
                <input type="text" id="p-receipt" placeholder="ضع رابط الصورة هنا لتست التجربة" required class="w-full border p-2 rounded-xl outline-blue-600">
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">إرسال الطلب للأدمن للتأكيد 🚀</button>
        </form>
    </div>

    <script>
        function submitBooking(e) {
            e.preventDefault();
            const doc = JSON.parse(sessionStorage.getItem('selectedDoctor')) || { name: "دكتور افتراضي", branch: "القاهرة", schedule: ["مفتوح"] };
            
            const bookingData = {
                patientName: document.getElementById('p-name').value,
                phone: document.getElementById('p-phone').value,
                doctor: doc.name,
                slot: doc.schedule[0],
                branch: doc.branch,
                receipt: document.getElementById('p-receipt').value
            };

            fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert('تم إرسال حجزك بنجاح! الإيصال قيد المراجعة حالياً من قبل الأدمن.');
                    window.location.href = 'index.html';
                }
            });
        }
    </script>
</body>
</html>
