<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأطباء المتاحين - مستشفى الشفاء</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
    /* كود ترويض مواعيد الدكاترة والمربعات البيضاء */
    * {
        box-sizing: border-box !important;
    }
    div, section, form, .container {
        max-width: 100% !important;
        width: 100% !important;
    }
    /* المربعات البيضاء اللي في الصورة */
    div[style*="background-color"], .appointment-card, .schedule-day, form > div {
        padding: 10px !important; 
        margin-left: 0 !important;
        margin-right: 0 !important;
    }
    /* عشان النصوص والمواعيد المقطوعة تنزل سطر جديد جوة الفريم */
    span, p, label, button, h1, h2, h3 {
        white-space: normal !important;
        max-width: 100% !important;
    }
</style>


</head>

<!-- الهيدر الرئيسي لعيادات حياة كير -->
<div style="background-color: #3b4ca8; padding: 15px 20px; display: flex; align-items: center; justify-content: center; direction: rtl; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%;">
    <div style="display: flex; align-items: center; gap: 15px;">
        <!-- صورة اللوجو الدائرية -->
        <img src="logo.png" alt="Hayah Care Logo" style="width: 55px; height: 55px; border-radius: 50%; border: 2px solid white; object-fit: cover;">
        
        <!-- اسم العيادات عربي وإنجليزي -->
        <div style="display: flex; flex-direction: column; align-items: flex-start;">
            <span style="color: white; font-weight: bold; font-size: 1.4rem; font-family: sans-serif; line-height: 1.2;">عيادات حياة كير</span>
            <span style="color: #e0e0e0; font-size: 0.85rem; font-family: sans-serif; letter-spacing: 0.5px; font-weight: 500;">HAYAH CARE CLINICS</span>
        </div>
    </div>
</div>




<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">أطباء المستشفى 🏥</h1>
            <button onclick="window.location.href='specialties.html'" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold transition">
                ← رجوع للتخصصات
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex justify-between items-center">
            <div>
                <span class="text-gray-500 text-sm">تصفح الأطباء حسب اختيارك:</span>
                <h2 id="filter-heading" class="text-lg font-bold text-blue-900 mt-1">جاري تحميل الاختيارات...</h2>
            </div>
            <span class="bg-blue-50 text-blue-700 text-xs px-3 py-1 rounded-full font-bold" id="doctors-count">0 أطباء</span>
        </div>

        <div id="doctors-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

        <div id="no-doctors-msg" class="hidden text-center py-12 bg-white rounded-2xl border border-dashed border-gray-300">
            <p class="text-gray-500 text-lg">عذراً، لا يوجد أطباء متاحين حالياً في هذا التخصص لهذا الفرع.</p>
            <button onclick="window.location.href='specialties.html'" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700">اختر تخصص آخر</button>
        </div>
    </main>

    <script>
        // قراءة الاختيارات من الذاكرة المحلية
        const branch = localStorage.getItem('selectedBranch') || 'القاهرة';
        const specialty = localStorage.getItem('selectedSpecialty') || 'باطنة';

        document.getElementById('filter-heading').innerText = `أطباء تخصص (${specialty}) - فرع ${branch}`;

        function fetchAndDisplayDoctors() {
            const listDiv = document.getElementById('doctors-list');
            const noDoctorsMsg = document.getElementById('no-doctors-msg');
            
            fetch('/api/doctors')
                .then(res => res.json())
                .then(allDoctors => {
                    const filtered = allDoctors.filter(doc => doc.branch === branch && doc.specialty === specialty);
                    document.getElementById('doctors-count').innerText = `${filtered.length} أطباء متاحين`;

                    if (filtered.length === 0) {
                        listDiv.innerHTML = '';
                        noDoctorsMsg.classList.remove('hidden');
                        return;
                    }

                    noDoctorsMsg.classList.add('hidden');
                    listDiv.innerHTML = '';

                    filtered.forEach(doc => {
                        // تحويل كائن الدكتور إلى نص آمن عشان نمرره في الزرار
                        const docString = JSON.stringify(doc).replace(/'/g, "&#39;");
                        listDiv.innerHTML += `
                            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col sm:flex-row gap-4 items-center hover:shadow-md transition">
                                <img src="${doc.image}" class="w-24 h-24 rounded-full object-cover border-4 border-blue-50 shadow-inner" alt="${doc.name}">
                                <div class="flex-1 text-center sm:text-right">
                                    <h3 class="text-xl font-bold text-gray-900">${doc.name}</h3>
                                    <p class="text-blue-600 text-sm font-medium mb-1">تخصص ${doc.specialty}</p>
                                    <p class="text-gray-500 text-xs mb-4">${doc.bio}</p>
                                    <button onclick='goToProfile(${docString})' class="w-full sm:w-auto bg-blue-600 text-white text-xs px-4 py-2 rounded-xl font-bold hover:bg-blue-700 transition">
                                        عرض المواعيد واحجز الآن 📅
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                })
                .catch(err => {
                    listDiv.innerHTML = `<p class="text-red-500 text-center col-span-2">حدث خطأ أثناء الاتصال بالسيرفر.</p>`;
                });
        }

       function goToProfile(doctorObj) {
    // حفظ بيانات الدكتور المختار في الـ localStorage
    localStorage.setItem('selectedDoctor', JSON.stringify(doctorObj));
    // الانتقال لصفحة البروفايل
    window.location.href = 'profile.html';
}

        fetchAndDisplayDoctors();
    </script>
</body>
</html>
